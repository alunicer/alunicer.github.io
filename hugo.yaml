baseURL: "https://hugo-dead-simple.netlify.com/"
languageCode: en-us
title: "阿伦的仓库"
enableGitInfo: true
menu:
  main:
    - name: "首页"
      url: /
      weight: 1

params:
  description: "Hugo dead simple example"
  noSearch: true

markup:
  highlight:
    codeFences: true
    style: bw
    lineNumbersInTable: false
    noClasses: false
  goldmark:
    extensions:
      passthrough:
        delimiters:
          block:
          - - \[
            - \]
          - - $$
            - $$
          inline:
          - - \(
            - \)
        enable: true
    renderer:
      unsafe: true

outputs:
  home:
    - html
    - rss
    - json
  page:
    - html

module:
  imports:
    - path: github.com/barklan/hugo-dead-simple
